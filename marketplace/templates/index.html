{% load static %}
<!doctype html>
<html lang="en">
  {% include 'header.html' %}
  <body>
    {% include 'nav.html' %} {% block content %} {% for book in books %}
    <div class="p-4 border rounded mb-4">
      <h2 class="text-xl font-bold">{{ book.title }}</h2>
      <p class="text-gray-600">by {{ book.author }}</p>
      <p class="text-yellow-500">Rating: {{ book.rating }}</p>
      <form action="{% url 'delete_book' book.id %}" method="post" class="mt-2">
        {% csrf_token %}
        <button
          type="submit"
          class="bg-red-500 hover:bg-red-700 text-white font-bold py-1 px-3 rounded focus:outline-none focus:shadow-outline"
        >
          Delete
        </button>
      </form>

    </div>
    {% endfor %} {% endblock %}
  </body>
</html>
